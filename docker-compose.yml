version: '3.8'
services:
  db-postgres:
    image: postgres:15-alpine
    container_name: postgres-api-tokens
    restart: always
    environment:
      - POSTGRES_DB=db_tokens_dinamicos
      - POSTGRES_USER=GMR
      - POSTGRES_PASSWORD=senha_secreta_123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: